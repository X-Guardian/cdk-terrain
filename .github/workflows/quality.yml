name: Quality
on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      concurrency_group_prefix:
        default: pr
        required: false
        type: string

env:
  HUSKY: "0"

concurrency:
  group: ${{ inputs.concurrency_group_prefix }}-quality-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  prettier:
    runs-on: ubuntu-latest
    container:
      image: terraconstructs/jsii-terraform@sha256:c46ac91c8be20947a2b0e27a517eb4a5bfc015c16a27341876ed0b04d734ddf5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
      - name: Setup corepack-managed pnpm
        uses: ./.github/actions/setup-corepack-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run prettier
        run: pnpm run lint:prettier

  lint:
    runs-on: ubuntu-latest
    container:
      image: terraconstructs/jsii-terraform@sha256:c46ac91c8be20947a2b0e27a517eb4a5bfc015c16a27341876ed0b04d734ddf5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Add Git safe.directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@38457b511e60ee4e1da09255b658e480748a1af4 # v5.0.1
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
      - name: Setup corepack-managed pnpm
        uses: ./.github/actions/setup-corepack-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint (affected)
        if: github.event_name == 'pull_request'
        run: pnpm exec nx affected -t lint --parallel=3 --format=gha --base="$NX_BASE" --head="$NX_HEAD"
      - name: Run lint (all)
        if: github.event_name != 'pull_request'
        run: pnpm exec nx run-many -t lint --parallel=3 --format=gha

  knip:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
      - name: Setup corepack-managed pnpm
        uses: ./.github/actions/setup-corepack-pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run knip
        run: pnpm exec knip --reporter github-actions --reporter symbols
