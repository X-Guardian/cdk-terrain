name: Unit Tests - PR
on:
  workflow_call:
    inputs:
      concurrency_group_prefix:
        default: pr
        required: false
        type: string

concurrency:
  group: ${{ inputs.concurrency_group_prefix }}-unit-affected-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  affected_no_terraform:
    name: "Affected Unit Tests (no terraform)"
    runs-on: depot-ubuntu-24.04-16
    container:
      image: terraconstructs/jsii-terraform@sha256:c46ac91c8be20947a2b0e27a517eb4a5bfc015c16a27341876ed0b04d734ddf5
    env:
      CHECKPOINT_DISABLE: "1"
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: "Add Git safe.directory" # Go 1.18+ embeds repo info in builds
        run: git config --global --add safe.directory /__w/cdk-terrain/cdk-terrain
      - name: ensure correct user
        run: chown -R root /__w/cdk-terrain

      - name: Derive base/head SHAs for nx affected
        uses: nrwl/nx-set-shas@38457b511e60ee4e1da09255b658e480748a1af4 # v5.0.1

      - name: Get cache directory paths
        id: global-cache-dir-path
        run: |
          echo "yarn=$(yarn cache dir)" >> $GITHUB_OUTPUT
          mkdir -p /usr/local/share/.cache/go
          echo "go=/usr/local/share/.cache/go" >> $GITHUB_OUTPUT
      - name: Restore yarn cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.yarn }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-unit
          restore-keys: |
            yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-
            yarn-${{ runner.os }}-
      - name: Restore go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.go }}
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-unit
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-

      - name: installing dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: align versions
        run: tools/align-version.sh

      - name: package (only when @cdktn/hcl2cdk is affected)
        # @cdktn/hcl2cdk's globalSetup.ts spawns `cdktn init --dist=...` which
        # reads jsii tarballs from the workspace-root dist/ directory; that
        # output isn't produced by an Nx target chain, only by `yarn package`
        # + tools/collect-dist.sh. Run it conditionally so unrelated PRs
        # don't pay the multi-language packaging cost.
        run: |
          if yarn --silent nx show projects --affected --base="$NX_BASE" --head="$NX_HEAD" | grep -qx '@cdktn/hcl2cdk'; then
            echo "@cdktn/hcl2cdk affected; running yarn package"
            yarn package
          else
            echo "@cdktn/hcl2cdk not affected; skipping yarn package"
          fi

      - name: nx affected - test (excluding terraform-dependent projects)
        run: |
          yarn nx affected -t test \
            --exclude='tag:needs:terraform','@examples/*','generate-function-bindings' \
            --parallel=2 \
            --base="$NX_BASE" --head="$NX_HEAD" \
            --coverage \
            --reporters=default --reporters=github-actions
        env:
          GOCACHE: ${{ steps.global-cache-dir-path.outputs.go }}

      - name: Coverage summary
        if: always()
        run: node tools/test-coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"

  affected_terraform:
    name: "Affected Unit Tests (terraform)"
    runs-on: depot-ubuntu-24.04-16
    container:
      image: terraconstructs/jsii-terraform@sha256:c46ac91c8be20947a2b0e27a517eb4a5bfc015c16a27341876ed0b04d734ddf5
    env:
      CHECKPOINT_DISABLE: "1"
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        terraform_version: ["1.6.5", "1.5.5"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: "Add Git safe.directory"
        run: git config --global --add safe.directory /__w/cdk-terrain/cdk-terrain
      - name: ensure correct user
        run: chown -R root /__w/cdk-terrain

      - name: Derive base/head SHAs for nx affected
        uses: nrwl/nx-set-shas@38457b511e60ee4e1da09255b658e480748a1af4 # v5.0.1

      - name: Get cache directory paths
        id: global-cache-dir-path
        run: |
          echo "yarn=$(yarn cache dir)" >> $GITHUB_OUTPUT
          mkdir -p /usr/local/share/.cache/go
          echo "go=/usr/local/share/.cache/go" >> $GITHUB_OUTPUT
          mkdir -p /usr/local/share/.cache/providerSchema
          echo "providerSchema=/usr/local/share/.cache/providerSchema" >> $GITHUB_OUTPUT
      - name: Restore yarn cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.yarn }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-unit
          restore-keys: |
            yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-
            yarn-${{ runner.os }}-
      - name: Restore go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.go }}
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-unit
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-
      - name: Restore provider schema cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.providerSchema }}
          key: providerSchema-${{ runner.os }}-${{ matrix.terraform_version }}-unit-affected

      - name: installing dependencies
        run: yarn install --frozen-lockfile --prefer-offline

      - name: align versions
        run: tools/align-version.sh

      - name: nx affected - test (terraform-dependent projects)
        run: |
          unset TF_PLUGIN_CACHE_DIR
          yarn nx affected -t test \
            --exclude='*,!tag:needs:terraform','@examples/*' \
            --parallel=2 \
            --base="$NX_BASE" --head="$NX_HEAD" \
            --coverage \
            --reporters=default --reporters=github-actions
        env:
          TERRAFORM_BINARY_NAME: "terraform${{ matrix.terraform_version }}"
          GOCACHE: ${{ steps.global-cache-dir-path.outputs.go }}
          CDKTF_EXPERIMENTAL_PROVIDER_SCHEMA_CACHE_PATH: ${{ steps.global-cache-dir-path.outputs.providerSchema }}

      - name: Coverage summary
        if: always()
        run: node tools/test-coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"

  results:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Unit Tests - PR - Result
    needs: [affected_no_terraform, affected_terraform]
    steps:
      - name: Fail if any required job failed or was cancelled
        run: exit 1
        if: >-
          ${{
               contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
          }}
