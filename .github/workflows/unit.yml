name: Unit Test Run
on:
  workflow_call:
    inputs:
      concurrency_group_prefix:
        default: pr
        required: false
        type: string
      package:
        required: true
        type: string
      terraform_version:
        required: true
        type: string

concurrency:
  group: ${{ inputs.concurrency_group_prefix }}-unit-${{ inputs.package }}-${{ inputs.terraform_version }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: depot-ubuntu-24.04-16
    container:
      image: terraconstructs/jsii-terraform@sha256:c46ac91c8be20947a2b0e27a517eb4a5bfc015c16a27341876ed0b04d734ddf5
    env:
      CHECKPOINT_DISABLE: "1"
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: "Add Git safe.directory" # Go 1.18+ started embedding repo info in the build and e.g. building @cdktn/hcl2json fails without this
        run: git config --global --add safe.directory /__w/cdk-terrain/cdk-terrain
      - name: ensure correct user
        run: chown -R root /__w/cdk-terrain

      # Setup caches for yarn, terraform, go, and provider schema
      - name: Get cache directory paths
        id: global-cache-dir-path
        run: |
          echo "yarn=$(yarn cache dir)" >> $GITHUB_OUTPUT
          mkdir -p /usr/local/share/.cache/go
          echo "go=/usr/local/share/.cache/go" >> $GITHUB_OUTPUT
          mkdir -p /usr/local/share/.cache/providerSchema
          echo "providerSchema=/usr/local/share/.cache/providerSchema" >> $GITHUB_OUTPUT
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.yarn }}
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-unit
          restore-keys: |
            yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}-
            yarn-${{ runner.os }}-
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.go }}
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-unit
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-${{ runner.os }}-
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.global-cache-dir-path.outputs.providerSchema }}
          key: providerSchema-${{ runner.os }}-${{ inputs.terraform_version }}-unit-${{ inputs.package }}

      - name: installing dependencies
        run: |
          yarn install --frozen-lockfile --prefer-offline
      - name: align versions
        run: tools/align-version.sh
      - name: package (when testing @cdktn/hcl2cdk)
        # hcl2cdk's globalSetup.ts spawns `cdktn init --dist=...` which reads
        # jsii tarballs from the workspace-root dist/ directory.
        if: inputs.package == '@cdktn/hcl2cdk'
        run: yarn package
      - name: test
        # nx test runs the @nx/jest plugin target, with `^build` honored via
        # nx.json targetDefaults — upstream packages are built automatically.
        run: |
          unset TF_PLUGIN_CACHE_DIR
          yarn nx test '${{ inputs.package }}' --ci --coverage --reporters=default --reporters=github-actions
        env:
          TERRAFORM_BINARY_NAME: "terraform${{ inputs.terraform_version }}"
          GOCACHE: ${{ steps.global-cache-dir-path.outputs.go }}
          CDKTF_EXPERIMENTAL_PROVIDER_SCHEMA_CACHE_PATH: ${{ steps.global-cache-dir-path.outputs.providerSchema }}

      - name: Coverage summary
        if: always()
        run: node tools/test-coverage-summary.mjs >> "$GITHUB_STEP_SUMMARY"
