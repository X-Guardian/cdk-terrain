name: Linting
on:
  merge_group:
    types: [checks_requested]
  pull_request: {} # All changes need linting
  workflow_call:
    inputs:
      concurrency_group_prefix:
        default: pr
        required: false
        type: string

concurrency:
  group: ${{ inputs.concurrency_group_prefix }}-linting-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  prettier:
    runs-on: ubuntu-latest
    container:
      image: terraconstructs/jsii-terraform@sha256:c46ac91c8be20947a2b0e27a517eb4a5bfc015c16a27341876ed0b04d734ddf5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: installing dependencies
        run: |
          yarn install --frozen-lockfile
      - name: run prettier
        run: |
          yarn lint:prettier

  lint:
    runs-on: ubuntu-latest
    container:
      image: terraconstructs/jsii-terraform@sha256:c46ac91c8be20947a2b0e27a517eb4a5bfc015c16a27341876ed0b04d734ddf5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: "Add Git safe.directory"
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@38457b511e60ee4e1da09255b658e480748a1af4 # v5.0.1
      - name: installing dependencies
        run: |
          yarn install --frozen-lockfile
      - name: run lint (affected)
        if: github.event_name == 'pull_request'
        run: |
          yarn nx affected -t lint --parallel=3 --format=gha --base="$NX_BASE" --head="$NX_HEAD"
      - name: run lint (all)
        if: github.event_name != 'pull_request'
        run: |
          yarn nx run-many -t lint --parallel=3 --format=gha
